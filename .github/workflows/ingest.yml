name: Ingest Climate Policy Data

on:
  schedule:
    - cron: '0 3 * * 1'    # weekly bulk (Mon 03:00 UTC) — Tier A sources
    # Tier B real-time pass (daily) will be added when those fetchers land.
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WB_CARBON_URL: ${{ secrets.WB_CARBON_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          pip install -r ingest/requirements.txt
          pip install datasets || echo "datasets optional — CPR step will skip"
      - name: Fetch — CPDB
        run: python ingest/fetch_cpdb.py || echo "skipped"
      - name: Fetch — OECD CAPMF
        run: python ingest/fetch_oecd_capmf.py || echo "skipped"
      - name: Fetch — Climate Watch
        run: python ingest/fetch_climatewatch.py || echo "skipped"
      - name: Fetch — World Bank Carbon Pricing
        run: python ingest/fetch_worldbank_carbon.py || echo "skipped"
      - name: Fetch — Net Zero Tracker
        run: python ingest/fetch_netzero.py || echo "skipped"
      - name: Fetch — CPR/CCLW (capped)
        run: python ingest/fetch_cpr.py || echo "skipped"
      - name: Normalize
        run: python ingest/normalize.py
      - name: Load to Postgres
        run: python ingest/load_to_db.py
      - name: Commit normalized snapshot
        run: |
          git config user.name "data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/records_normalized.csv
          git commit -m "data snapshot $(date -u +%Y-%m-%d)" || echo "no changes"
          git push || echo "push skipped"
